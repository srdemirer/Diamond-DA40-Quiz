<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uçak Limitleri Testi</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: #f0f4f8;
            color: #1a202c;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 15px;
        }
        .quiz-container {
            background-color: #ffffff;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            padding: 25px;
            max-width: 550px;
            width: 100%;
        }
        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { color: #0b3c5d; font-size: 1.5rem; margin: 0 0 5px 0; }
        .header p { color: #718096; margin: 0; font-size: 0.9rem; }
        .progress-bar { height: 6px; background-color: #e2e8f0; border-radius: 3px; margin-bottom: 25px; overflow: hidden; display: none;}
        .progress-fill { height: 100%; background-color: #328cc1; width: 0%; transition: width 0.3s ease; }
        .options { display: flex; flex-direction: column; gap: 12px; }
        .btn {
            background-color: #f7fafc; border: 2px solid #e2e8f0; padding: 14px 18px;
            border-radius: 10px; cursor: pointer; font-size: 1rem; font-weight: 500;
            text-align: left; color: #4a5568; transition: all 0.2s ease; -webkit-tap-highlight-color: transparent;
        }
        .btn:hover:not([disabled]) { background-color: #edf2f7; border-color: #cbd5e0; }
        .aircraft-btn { background-color: #e3fafc; border-color: #99e9f2; color: #0c8599; text-align: center; font-weight: 600;}
        .aircraft-btn:hover { background-color: #c5f6fa !important; }
        .correct { background-color: #c6f6d5 !important; border-color: #48bb78 !important; color: #22543d !important; font-weight: 600; }
        .wrong { background-color: #fed7d7 !important; border-color: #f56565 !important; color: #742a2a !important; font-weight: 600; }
        .explanation { margin-top: 20px; padding: 15px; background-color: #ebf8ff; border-left: 4px solid #3182ce; border-radius: 4px; font-size: 0.95rem; line-height: 1.5; color: #2b6cb0; display: none; }
        .next-btn { display: block; width: 100%; background-color: #0b3c5d; color: white; text-align: center; padding: 14px; margin-top: 20px; border: none; border-radius: 10px; cursor: pointer; font-size: 1rem; font-weight: 600; display: none; box-shadow: 0 4px 6px rgba(11, 60, 93, 0.2); }
        .score-container { text-align: center; padding: 10px 0; }
        .score-title { font-size: 1.4rem; font-weight: bold; color: #2d3748; margin-bottom: 10px; }
        .score-number { font-size: 3rem; font-weight: 800; color: #328cc1; margin-bottom: 20px; }
        .restart-btn { background-color: #328cc1; color: white; border: none; padding: 12px 25px; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: 15px;}
        
        .input-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; }
        .input-control { padding: 14px; border-radius: 10px; border: 2px solid #e2e8f0; font-size: 1rem; }
        .input-btn { background-color: #0b3c5d; color: white; border: none; font-weight: bold; cursor: pointer; }
        .stats-panel { margin-top: 25px; border-top: 2px dashed #e2e8f0; padding-top: 20px; text-align: left; }
        .stats-title { font-weight: bold; color: #4a5568; margin-bottom: 10px; font-size: 1.1rem; }
        #stats-canvas { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; width: 100%; margin-top: 10px; }
        .user-welcome { font-size: 0.95rem; color: #4a5568; margin-bottom: 15px; font-weight: 600; text-align: center; }
        
        /* İstediğin Yeni Tasarım Alanları */
        .question { font-size: 1.15rem; font-weight: 600; margin-bottom: 24px; padding-bottom: 12px; } /* Soru ve şıklar arası boşluk */
        .footer-signature { font-size: 0.75rem; color: #a0aec0; margin-top: 25px; text-align: center; user-select: none; cursor: pointer; }
        
        /* Gizli Admin Paneli Stili */
        .admin-panel { background: white; border-radius: 12px; padding: 15px; margin-top: 15px; width: 100%; max-width: 550px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); display: none; }
        .admin-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.85rem; }
        .admin-table th, .admin-table td { border: 1px solid #e2e8f0; padding: 8px; text-align: left; }
        .admin-table th { background-color: #f7fafc; }
    </style>
</head>
<body>

<div class="quiz-container">
    <div class="header">
        <h1 id="main-title">Uçak Limitleri Testi ✈️</h1>
        <p id="question-counter">Sistem Başlatılıyor...</p>
    </div>
    
    <div class="progress-bar" id="progress-bar-container"><div class="progress-fill" id="progress-fill"></div></div>

    <div id="login-screen" style="display: none;">
        <div class="input-group">
            <label style="font-weight: 600; color: #4a5568;">Lütfen Adınızı ve Soyadınızı Girin:</label>
            <input type="text" id="username-input" class="input-control" placeholder="Örn: Ahmet Yılmaz">
            <button class="input-control input-btn" onclick="saveUser()">Portala Giriş Yap</button>
        </div>
    </div>

    <div id="aircraft-selector" style="display: none;">
        <div id="welcome-msg" class="user-welcome"></div>
        <div class="options">
            <button class="btn aircraft-btn" onclick="startQuiz('a211')">Aquila A211</button>
            <button class="btn aircraft-btn" onclick="startQuiz('da20')">Diamond DA20 Eclipse</button>
            <button class="btn aircraft-btn" onclick="startQuiz('da40')">Diamond DA40 NG</button>
            <button class="btn aircraft-btn" onclick="startQuiz('da42')">Diamond DA42 Twin Star</button>
        </div>
        
        <div class="stats-panel" id="stats-panel" style="display: none;">
            <div class="stats-title">📊 Son 5 Test Performans Grafiğiniz (%)</div>
            <canvas id="stats-canvas" height="150"></canvas>
        </div>
    </div>

    <div id="quiz-body" style="display: none;">
        <div class="question" id="question-text"></div>
        <div class="options" id="options-container"></div>
        <div class="explanation" id="explanation-box"></div>
        <button class="next-btn" id="next-button" onclick="nextQuestion()">Sonraki Soru</button>
    </div>

    <div id="result-body" class="score-container" style="display: none;">
        <div class="score-title">Test Tamamlandı! 🎉</div>
        <div class="score-number"><span id="score">0</span> / <span id="total">0</span></div>
        <div id="user-score-msg" style="font-weight: 600; color: #4a5568; margin-bottom: 10px;"></div>
        <button class="restart-btn" onclick="backToMenu()">Ana Menüye Dön</button>
    </div>
</div>

<div class="footer-signature" onclick="handleSignatureClick()">
    Created by <span style="font-weight: 600; color: #718096;">S.R.Demirer</span>
</div>

<div id="admin-panel" class="admin-panel">
    <div style="font-weight: bold; color: #2d3748; display: flex; justify-content: space-between;">
        <span>📋 Cihaz Sınav Geçmişi (Admin)</span>
        <button onclick="clearAdminLogs()" style="font-size: 0.75rem; cursor: pointer; background: #fed7d7; border: 1px solid #f56565; color: #c53030; border-radius: 4px; padding: 2px 6px;">Temizle</button>
    </div>
    <table class="admin-table">
        <thead>
            <tr>
                <th>Pilot Adı</th>
                <th>A/C</th>
                <th>Skor</th>
                <th>Tarih</th>
            </tr>
        </thead>
        <tbody id="admin-table-body">
            </tbody>
    </table>
</div>

            { soru: "1080 - 1180 KG Kalkış Ağırlığı İçin Manevra Sürati Kaçtır?", secenekler: ["101 KIAS", "108 KIAS", "113 KIAS", "105 KIAS"], cevap: "108 KIAS", aciklama: "Orta ağırlık bandında manevra sürati Va 108 KIAS'tır." },
            { soru: "1180+ KG Kalkış Ağırlığı İçin Manevra Sürati Kaçtır?", secenekler: ["101 KIAS", "108 KIAS", "113 KIAS", "120 KIAS"], cevap: "113 KIAS", aciklama: "Tam yüklü ağır uçakta en yüksek Va limiti 113 KIAS'tır." }
        ],
        a211: [
            { soru: "Aquila A211 için Asla Aşılmaması Gereken Sürat (Vne) kaç knots'tır?", secenekler: ["130 kts", "165 kts", "147 kts", "115 kts"], cevap: "147 kts", aciklama: "Aquila A211 AFM'ine göre Vne hızı 147 knots'tır." },
            { soru: "Aquila A211'in Maksimum Kalkış Ağırlığı (MTOW) kaç kg'dır?", secenekler: ["750 kg", "850 kg", "1150 kg", "650 kg"], cevap: "750 kg", aciklama: "Çok hafif bir VLA uçağı olan Aquila A211'in MTOW limiti 750 kg'dır." },
            { soru: "Aquila A211'de kullanılan Rotax 912S motorunun maksimum sürekli gücü kaç HP'dir?", secenekler: ["80 HP", "100 HP", "135 HP", "115 HP"], cevap: "100 HP", aciklama: "Uçakta bulunan Rotax 912 S3 motoru tam olarak 100 Beygir (HP) güç üretir." },
            { soru: "Aquila A211'de Flaps LDG (İniş) konumunda Vfe limit sürati kaç knots'tır?", secenekler: ["84 kts", "98 kts", "90 kts", "75 kts"], cevap: "84 kts", aciklama: "Tam flap (Landing) pozisyonunda maksimum hız sınırı 84 knots'tır." },
            { soru: "Aquila A211'in toplam KULLANILABİLİR yakıt miktarı kaç litredir?", secenekler: ["120 Litre", "104 Litre", "109 Litre", "95 Litre"], cevap: "104 Litre", aciklama: "Toplam yakıt hacmi 109.6 litredir fakat bunun kullanılabilir kısmı 104 litredir." }
        ],
        da20: [
            { soru: "Diamond DA20 Eclipse (Katana) uçağının asla aşılmaması gereken hızı (Vne) kaç KIAS'tır?", secenekler: ["130 KIAS", "164 KIAS", "172 KIAS", "140 KIAS"], cevap: "164 KIAS", aciklama: "DA20 uçağının Vne sürati 164 KIAS'tır." },
            { soru: "DA20 Eclipse modelinin Maksimum Kalkış Ağırlığı kaç kg / lbs'tir?", secenekler: ["750 kg / 1653 lbs", "800 kg / 1764 lbs", "940 kg / 2072 lbs", "1150 kg / 2535 lbs"], cevap: "800 kg / 1764 lbs", aciklama: "DA20 Eclipse modeli için maksimum kalkış ağırlığı 800 kg (1764 lbs) olarak belirlenmiştir." },
            { soru: "DA20 uçağında en iyi tırmanış oranı sürati (Vy) kaç KIAS'tır?", secenekler: ["68 KIAS", "75 KIAS", "83 KIAS", "60 KIAS"], cevap: "75 KIAS", aciklama: "Temiz konfigürasyonda en iyi tırmanış oranı sürati (Vy) 75 KIAS'tır." },
            { soru: "DA20 elektrik sisteminde alternator kaç Amper akım sağlar?", secenekler: ["40 A", "70 A", "60 A", "50 A"], cevap: "40 A", aciklama: "DA20 Eclipse alternatörü 14 Volt DC sistem üzerinden maksimum 40 Amper yük sağlar." }
        ],
        da42: [
            { soru: "DA42 NG uçağının Asla Aşılmaması Gereken Sürati (Vne) kaç KIAS'tır?", secenekler: ["172 KIAS", "188 KIAS", "197 KIAS", "155 KIAS"], cevap: "188 KIAS", aciklama: "Çift motorlu DA42 NG modelinde Vne sürati 188 KIAS'tır." },
            { soru: "DA42'de tek motorun emniyetle kumanda edilebileceği minimum sürat (Vmc) kaç KIAS'tır?", secenekler: ["68 KIAS", "71 KIAS", "76 KIAS", "85 KIAS"], cevap: "71 KIAS", aciklama: "Tek motor arızasında aerodinamik kumandayı yitirmemek için düşmemeniz gereken asgari kritik sürat (Vmc) 71 KIAS'tır." },
            { soru: "DA42 NG için Maksimum Kalkış Ağırlığı (MTOM) kaç kg'dır?", secenekler: ["1310 kg", "1785 kg", "1999 kg", "1900 kg"], cevap: "1999 kg", aciklama: "DA42 NG modelinin maksimum kalkış ağırlığı tam sınır olan 1999 kg'dır." },
            { soru: "DA42'de iniş takımlarını açabileceğiniz maksimum sürat (Vloe) kaç KIAS'tır?", secenekler: ["110 KIAS", "130 KIAS", "188 KIAS", "152 KIAS"], cevap: "188 KIAS", aciklama: "DA42'de iniş takımını dışarıda tutma ve açma yapısal hız sınırı (Vlo) oldukça yüksektir und 188 KIAS'tır." }
        ]
    };

    let activeQuestions = [];
    let currentQuestionIndex = 0;
    let score = 0;
    let currentUser = "";
    let selectedAircraft = "";
    let signatureClickCount = 0;

    const loginScreen = document.getElementById('login-screen');
    const aircraftSelector = document.getElementById('aircraft-selector');
    const quizBody = document.getElementById('quiz-body');
    const resultBody = document.getElementById('result-body');
    const questionText = document.getElementById('question-text');
    const optionsContainer = document.getElementById('options-container');
    const explanationBox = document.getElementById('explanation-box');
    const nextButton = document.getElementById('next-button');
    const questionCounter = document.getElementById('question-counter');
    const progressFill = document.getElementById('progress-fill');
    const progressBarContainer = document.getElementById('progress-bar-container');
    const mainTitle = document.getElementById('main-title');
    const welcomeMsg = document.getElementById('welcome-msg');
    const userScoreMsg = document.getElementById('user-score-msg');
    const adminPanel = document.getElementById('admin-panel');
    const adminTableBody = document.getElementById('admin-table-body');

    window.onload = function() {
        const storedUser = localStorage.getItem('pilot_name');
        if (storedUser) {
            currentUser = storedUser;
            showMainMenu();
        } else {
            showLoginScreen();
        }
    };

    function showLoginScreen() {
        mainTitle.innerText = "Uçak Limitleri Testi ✈️";
        questionCounter.innerText = "Kullanıcı Kaydı Gerekli";
        loginScreen.style.display = 'block';
        aircraftSelector.style.display = 'none';
        quizBody.style.display = 'none';
    }

    function saveUser() {
        const nameInput = document.getElementById('username-input').value.trim();
        if(nameInput === "") {
            alert("Lütfen geçerli bir ad soyad girin!");
            return;
        }
        localStorage.setItem('pilot_name', nameInput);
        currentUser = nameInput;
        showMainMenu();
    }

    function showMainMenu() {
        loginScreen.style.display = 'none';
        quizBody.style.display = 'none';
        resultBody.style.display = 'none';
        progressBarContainer.style.display = 'none';
        
        mainTitle.innerText = "Uçak Limitleri Testi ✈️";
        questionCounter.innerText = "Lütfen Uçak Tipini Seçiniz";
        questionCounter.style.display = 'block';
        
        welcomeMsg.innerText = `Pilot: ${currentUser} 👩‍✈️👨‍✈️`;
        aircraftSelector.style.display = 'block';
        
        drawChart();
        updateAdminTable();
    }

    function startQuiz(aircraftType) {
        selectedAircraft = aircraftType;
        
        // CRITICAL UPDATE: Ana soru listesini tamamen rastgele karıştırıyoruz
        let rawQuestions = allQuizzes[aircraftType];
        activeQuestions = [...rawQuestions].sort(() => Math.random() - 0.5);
        
        currentQuestionIndex = 0;
        score = 0;

        aircraftSelector.style.display = 'none';
        adminPanel.style.display = 'none'; // Test esnasında admin panelini kapat
        signatureClickCount = 0;
        quizBody.style.display = 'block';
        progressBarContainer.style.display = 'block';

        if(aircraftType === 'da40') mainTitle.innerText = "Diamond DA40 NG";
        if(aircraftType === 'a211') mainTitle.innerText = "Aquila A211";
        if(aircraftType === 'da20') mainTitle.innerText = "Diamond DA20 Eclipse";
        if(aircraftType === 'da42') mainTitle.innerText = "Diamond DA42 Twin Star";

        loadQuestion();
    }

    function loadQuestion() {
        resetState();
        let currentQuestion = activeQuestions[currentQuestionIndex];
        
        questionCounter.innerText = `Soru ${currentQuestionIndex + 1} / ${activeQuestions.length}`;
        const progressPercent = (currentQuestionIndex / activeQuestions.length) * 100;
        progressFill.style.width = `${progressPercent}%`;

        questionText.innerText = currentQuestion.soru;
        
        // Şıkları kendi içinde karıştırarak ekleme
        let optionsShuffled = [...currentQuestion.secenekler].sort(() => Math.random() - 0.5);

        optionsShuffled.forEach(option => {
            const button = document.createElement('button');
            button.innerText = option;
            button.classList.add('btn');
            button.addEventListener('click', () => selectAnswer(button, currentQuestion.cevap, currentQuestion.aciklama));
            optionsContainer.appendChild(button);
        });
    }

    function resetState() {
        explanationBox.style.display = 'none';
        nextButton.style.display = 'none';
        optionsContainer.innerHTML = '';
    }

    function selectAnswer(selectedButton, correctAnswer, explanation) {
        const buttons = optionsContainer.querySelectorAll('.btn');
        buttons.forEach(btn => {
            btn.disabled = true; 
            if(btn.innerText === correctAnswer) btn.classList.add('correct'); 
        });

        if (selectedButton.innerText === correctAnswer) {
            score++;
        } else {
            selectedButton.classList.add('wrong'); 
        }

        explanationBox.innerText = explanation;
        explanationBox.style.display = 'block';
        nextButton.style.display = 'block';
        
        if (currentQuestionIndex === activeQuestions.length - 1) {
            nextButton.innerText = "Sonuçları ve İstatistikleri Gör";
        } else {
            nextButton.innerText = "Sonraki Soru";
        }
    }

    function nextQuestion() {
        currentQuestionIndex++;
        if (currentQuestionIndex < activeQuestions.length) {
            loadQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        progressFill.style.width = '100%';
        quizBody.style.display = 'none';
        progressBarContainer.style.display = 'none';
        questionCounter.style.display = 'none';
        
        const percentage = Math.round((score / activeQuestions.length) * 100);
        saveHistory(selectedAircraft, percentage);

        resultBody.style.display = 'block';
        document.getElementById('score').innerText = score;
        document.getElementById('total').innerText = activeQuestions.length;
        
        userScoreMsg.innerText = `Pilot ${currentUser}, Bu Testteki Başarı Oranınınız: %${percentage}`;
    }

    function backToMenu() {
        showMainMenu();
    }

    function saveHistory(aircraft, pct) {
        let history = JSON.parse(localStorage.getItem('quiz_history')) || [];
        const newRecord = {
            pilot: currentUser, // Hangi ismin çözdüğünü loglara ekliyoruz
            aircraft: aircraft.toUpperCase(),
            score: pct,
            date: new Date().toLocaleDateString('tr-TR', {hour: '2-digit', minute:'2-digit'})
        };
        history.push(newRecord);
        localStorage.setItem('quiz_history', JSON.stringify(history));
    }

    // GİZLİ ADMİN PANELİ TETİKLEYİCİSİ (3 Tıklama)
    function handleSignatureClick() {
        signatureClickCount++;
        if (signatureClickCount === 3) {
            if (adminPanel.style.display === 'none' || adminPanel.style.display === '') {
                updateAdminTable();
                adminPanel.style.display = 'block';
                // Sayfayı admin paneline doğru kaydır
                adminPanel.scrollIntoView({ behavior: 'smooth' });
            } else {
                adminPanel.style.display = 'none';
            }
            signatureClickCount = 0;
        }
    }

    function updateAdminTable() {
        const history = JSON.parse(localStorage.getItem('quiz_history')) || [];
        adminTableBody.innerHTML = '';
        
        if(history.length === 0) {
            adminTableBody.innerHTML = `<tr><td colspan="4" style="text-align:center; color:#a0aec0;">Henüz sınav kaydı bulunmuyor.</td></tr>`;
            return;
        }

        // En yeni çözümleri üstte göstermek için ters çeviriyoruz
        [...history].reverse().forEach(log => {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td style="font-weight:600;">${log.pilot || 'Bilinmeyen'}</td>
                <td>${log.aircraft}</td>
                <td style="font-weight:bold; color:${log.score >= 75 ? '#2f855a' : '#c53030'}">%${log.score}</td>
                <td>${log.date}</td>
            `;
            adminTableBody.appendChild(row);
        });
    }

    function clearAdminLogs() {
        if(confirm("Tüm kullanıcı sınav geçmişini silmek istediğinize emin misiniz?")) {
            localStorage.removeItem('quiz_history');
            updateAdminTable();
            drawChart();
        }
    }

    function drawChart() {
        const history = JSON.parse(localStorage.getItem('quiz_history')) || [];
        const canvas = document.getElementById('stats-canvas');
        const statsPanel = document.getElementById('stats-panel');
        
        if (history.length === 0) {
            statsPanel.style.display = 'none';
            return;
        }
        
        statsPanel.style.display = 'block';
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        const padding = 30;
        const chartWidth = canvas.width - padding * 2;
        const chartHeight = canvas.height - padding * 2;
        
        ctx.beginPath();
        ctx.strokeStyle = '#cbd5e0';
        ctx.lineWidth = 1;
        ctx.moveTo(padding, padding);
        ctx.lineTo(padding, canvas.height - padding);
        ctx.lineTo(canvas.width - padding, canvas.height - padding);
        ctx.stroke();

        const points = [];
        // Sadece son 5 testi grafiğe dök (Kullanıcı kalabalıklaşsa bile grafik taşmasın)
        const displayHistory = history.slice(-5);
        const stepX = displayHistory.length > 1 ? chartWidth / (displayHistory.length - 1) : chartWidth;

        displayHistory.forEach((data, index) => {
            const x = padding + (index * stepX);
            const y = (canvas.height - padding) - (data.score / 100 * chartHeight);
            points.push({x, y, label: data.aircraft, score: data.score});
        });

        if (points.length > 0) {
            ctx.beginPath();
            ctx.strokeStyle = '#328cc1';
            ctx.lineWidth = 3;
            ctx.moveTo(points[0].x, points[0].y);
            for(let i=1; i<points.length; i++) {
                ctx.lineTo(points[i].x, points[i].y);
            }
            ctx.stroke();
        }

        points.forEach(p => {
            ctx.beginPath();
            ctx.fillStyle = '#0b3c5d';
            ctx.arc(p.x, p.y, 5, 0, Math.PI * 2);
            ctx.fill();

            ctx.font = 'bold 9px Arial';
            ctx.fillStyle = '#4a5568';
            ctx.fillText(`%${p.score}`, p.x - 8, p.y - 10);
            ctx.font = '8px Arial';
            ctx.fillText(p.label, p.x - 12, canvas.height - padding + 15);
        });
    }
</script>
