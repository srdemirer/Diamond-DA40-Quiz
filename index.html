<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uçak Limitleri</title>
    <style>
        * { box-sizing: border-box; }
        
        :root {
            --bg-color: #f0f4f8;
            --container-bg: #ffffff;
            --text-color: #1a202c;
            --primary-color: #0b3c5d;
            --accent-color: #328cc1;
            --btn-bg: #f7fafc;
            --btn-border: #e2e8f0;
            --btn-text: #4a5568;
        }

        [data-theme="exam"] {
            --bg-color: #1a202c;
            --container-bg: #2d3748;
            --text-color: #edf2f7;
            --primary-color: #90cdf4;
            --accent-color: #4299e1;
            --btn-bg: #4a5568;
            --btn-border: #718096;
            --btn-text: #e2e8f0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 15px;
            transition: all 0.3s ease;
        }
        .quiz-container {
            background-color: var(--container-bg);
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            padding: 25px;
            max-width: 550px;
            width: 100%;
            position: relative;
        }
        
        .top-buttons {
            position: absolute;
            top: 15px;
            right: 15px;
            display: flex;
            gap: 8px;
        }

        .theme-switch, .share-btn {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            cursor: pointer;
            font-weight: bold;
            transition: opacity 0.2s;
        }
        
        .share-btn {
            background: #2f855a;
        }

        .theme-switch:hover, .share-btn:hover {
            opacity: 0.9;
        }

        .timer-badge {
            font-size: 1.1rem;
            font-weight: 800;
            color: #e53e3e;
            background: #fff5f5;
            padding: 4px 12px;
            border-radius: 8px;
            border: 2px solid #fed7d7;
            display: inline-block;
            margin-top: 5px;
        }
        [data-theme="exam"] .timer-badge {
            background: #742a2a;
            border-color: #e53e3e;
            color: #fff5f5;
        }

        .header { text-align: center; margin-bottom: 20px; padding-top: 15px; }
        .header h1 { color: var(--primary-color); font-size: 1.5rem; margin: 0 0 5px 0; }
        .header p { color: #718096; margin: 0; font-size: 0.9rem; }
        .progress-bar { height: 6px; background-color: #e2e8f0; border-radius: 3px; margin-bottom: 25px; overflow: hidden; display: none;}
        .progress-fill { height: 100%; background-color: var(--accent-color); width: 0%; transition: width 0.3s ease; }
        .options { display: flex; flex-wrap: wrap; gap: 12px; flex-direction: column; }
        
        .btn {
            background-color: var(--btn-bg); border: 2px solid var(--btn-border); padding: 14px 18px;
            border-radius: 10px; cursor: pointer; font-size: 1rem; font-weight: 500;
            text-align: left; color: var(--btn-text); transition: all 0.2s ease; -webkit-tap-highlight-color: transparent;
        }
        .btn:hover:not([disabled]) { background-color: #edf2f7; border-color: #cbd5e0; }
        [data-theme="exam"] .btn:hover:not([disabled]) { background-color: #718096; }
        
        .aircraft-btn { background-color: #e3fafc; border-color: #99e9f2; color: #0c8599; text-align: center; font-weight: 600;}
        .aircraft-btn:hover:not([disabled]) { background-color: #c5f6fa !important; }
        
        .subcat-btn { background-color: #fff9db; border-color: #ffe066; color: #f08c00; text-align: center; font-weight: 600; }
        .subcat-btn:hover:not([disabled]) { background-color: #fff3bf !important; }

        .aircraft-btn:disabled {
            background-color: #edf2f7 !important;
            border-color: #e2e8f0 !important;
            color: #a0aec0 !important;
            cursor: not-allowed !important;
            opacity: 0.7;
        }
        
        .correct { background-color: #c6f6d5 !important; border-color: #48bb78 !important; color: #22543d !important; font-weight: 600; }
        .wrong { background-color: #fed7d7 !important; border-color: #f56565 !important; color: #742a2a !important; font-weight: 600; }
        
        .explanation { margin-top: 20px; padding: 15px; background-color: #ebf8ff; border-left: 4px solid #3182ce; border-radius: 4px; font-size: 0.95rem; line-height: 1.5; color: #2b6cb0; display: none; }
        [data-theme="exam"] .explanation { background-color: #2b6cb0; color: white; border-left-color: #90cdf4; }

        .nav-controls { display: flex; gap: 10px; margin-top: 20px; }
        .nav-btn { flex: 1; padding: 12px; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; text-align: center; font-size: 0.95rem; }
        .prev-style { background-color: #e2e8f0; color: #4a5568; }
        .prev-style:hover:not([disabled]) { background-color: #cbd5e0; }
        .prev-style:disabled { opacity: 0.5; cursor: not-allowed; }
        .pas-style { background-color: #a0aec0; color: white; }
        .pas-style:hover { background-color: #718096; }
        .flag-style { background-color: #ed8936; color: white; }
        .flag-style:hover { background-color: #dd6b20; }
        .next-style { background-color: var(--primary-color); color: white; box-shadow: 0 4px 6px rgba(11, 60, 93, 0.2); }
        [data-theme="exam"] .next-style { color: #1a202c; }
        .finish-style { background-color: #2f855a; color: white; }
        
        .matrix-container { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 25px; padding-top: 15px; border-top: 1px solid #e2e8f0; justify-content: center; }
        .matrix-box { width: 26px; height: 26px; border-radius: 6px; border: 1px solid #cbd5e0; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 600; cursor: pointer; background-color: white; color: #1a202c; user-select: none; }
        .matrix-box.active { border: 2px solid var(--accent-color); transform: scale(1.1); }
        .matrix-box.m-correct { background-color: #48bb78; color: white; border-color: #38a169; }
        .matrix-box.m-wrong { background-color: #f56565; color: white; border-color: #e53e3e; }
        .matrix-box.m-pas { background-color: #a0aec0; color: white; border-color: #718096; }
        .matrix-box.m-flag { background-color: #ed8936; color: white; border-color: #dd6b20; }

        .score-container { text-align: center; padding: 10px 0; }
        .score-title { font-size: 1.4rem; font-weight: bold; margin-bottom: 10px; }
        .score-number { font-size: 3rem; font-weight: 800; color: var(--accent-color); margin-bottom: 20px; }
        .restart-btn { background-color: var(--accent-color); color: white; border: none; padding: 12px 25px; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: 15px; width: 100%;}
        .review-btn { background-color: #ed8936; color: white; border: none; padding: 12px 25px; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: 10px; width: 100%; }
        
        .cert-btn { background-color: #2b6cb0; color: white; border: none; padding: 12px 25px; border-radius: 8px; font-size: 1rem; font-weight: 700; cursor: pointer; margin-top: 10px; width: 100%; display: none; box-shadow: 0 4px 6px rgba(43, 108, 176, 0.3); }

        .category-breakdown { margin-top: 20px; padding: 15px; background: #f7fafc; border-radius: 10px; text-align: left; border: 1px solid #e2e8f0; }
        [data-theme="exam"] .category-breakdown { background: #4a5568; border-color: #718096; }
        .category-item { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.9rem; font-weight: 500; }
        
        .review-list { max-height: 300px; overflow-y: auto; text-align: left; margin-top: 15px; padding: 10px; background: #fffaf0; border-radius: 8px; border: 1px dashed #dd6b20; }
        [data-theme="exam"] .review-list { background: #2d3748; color: #edf2f7; }
        .review-item { padding: 10px 0; border-bottom: 1px solid #e2e8f0; font-size: 0.9rem; }

        .insight-badge { background: #fffaf0; border: 1px solid #feebc8; color: #c05621; padding: 12px; border-radius: 10px; margin-top: 15px; font-size: 0.85rem; line-height: 1.4; font-weight: 500; display: none; }
        [data-theme="exam"] .insight-badge { background: #7b341e; border-color: #c05621; color: #fffaf0; }

        .input-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; text-align: left;}
        .input-control { padding: 14px; border-radius: 10px; border: 2px solid #e2e8f0; font-size: 1rem; width: 100%; background: white; color: #1a202c;}
        .input-btn { background-color: var(--primary-color); color: white; border: none; font-weight: bold; cursor: pointer; margin-top: 5px;}
        [data-theme="exam"] .input-btn { color: #1a202c; }
        
        .stats-panel { margin-top: 25px; border-top: 2px dashed #e2e8f0; padding-top: 20px; text-align: left; }
        .stats-title { font-weight: bold; color: #4a5568; margin-bottom: 10px; font-size: 1.1rem; }
        [data-theme="exam"] .stats-title { color: #edf2f7; }
        #stats-canvas, #pie-canvas { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; width: 100%; margin-top: 10px; }
        .user-welcome { font-size: 0.95rem; margin-bottom: 15px; font-weight: 600; text-align: center; }
        
        .question { font-size: 1.15rem; font-weight: 600; margin-bottom: 24px; padding-bottom: 12px; }
        .footer-signature { font-size: 0.75rem; color: #a0aec0; margin-top: 25px; text-align: center; user-select: none; cursor: pointer; }
        
        .admin-panel { background: white; border-radius: 12px; padding: 15px; margin-top: 15px; width: 100%; max-width: 550px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); display: none; color: #1a202c;}
        .admin-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.85rem; }
        .admin-table th, .admin-table td { border: 1px solid #e2e8f0; padding: 8px; text-align: left; }
        .admin-table th { background-color: #f7fafc; }

        .custom-modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6); display: flex; justify-content: center;
            align-items: center; z-index: 9999; opacity: 0; pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .custom-modal-overlay.show { opacity: 1; pointer-events: auto; }
        .custom-modal {
            background: white; color: #1a202c; border-radius: 16px; padding: 25px;
            max-width: 420px; width: 90%; text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            transform: scale(0.8); transition: transform 0.3s ease;
            border: 3px solid #328cc1;
        }
        .custom-modal-overlay.show .custom-modal { transform: scale(1); }
        .custom-modal-title { font-size: 1.25rem; font-weight: bold; margin-bottom: 12px; color: #0b3c5d; }
        .custom-modal-text { font-size: 1rem; line-height: 1.5; margin-bottom: 20px; font-weight: 500; }
        .custom-modal-btn {
            background: var(--primary-color); color: white; border: none;
            padding: 10px 24px; border-radius: 8px; font-weight: bold;
            cursor: pointer; font-size: 0.95rem; width: 100%; transition: background 0.2s;
        }
        [data-theme="exam"] .custom-modal {
            background: #2d3748; color: #edf2f7; border-color: #e53e3e;
            box-shadow: 0 0 20px rgba(229, 62, 92, 0.4);
        }
        [data-theme="exam"] .custom-modal-title { color: #fc8181; }
        [data-theme="exam"] .custom-modal-btn { background: #e53e3e; color: white; }
    </style>
</head>
<body>

<div class="custom-modal-overlay" id="troll-modal-overlay">
    <div class="custom-modal">
        <div class="custom-modal-title" id="troll-modal-title">🚨 KOKPİT İKAZI 🚨</div>
        <div class="custom-modal-text" id="troll-modal-text">Yükleniyor...</div>
        <button class="custom-modal-btn" onclick="closeTrollModal()">Anlaşıldı, Devam Et 🧑‍✈️</button>
    </div>
</div>

<div class="quiz-container">
    <div class="top-buttons">
        <button class="share-btn" onclick="shareSystem()">Paylaş 🔗</button>
        <button class="theme-switch" onclick="toggleTheme()" id="theme-toggle-btn">Sınav Modu ⏱️</button>
    </div>

    <div class="header">
        <h1 id="main-title">Uçak Limitleri ✈️</h1>
        <p id="question-counter">Sistem Başlatılıyor...</p>
        <div id="quiz-timer" class="timer-badge" style="display: none;">15:00</div>
    </div>
    
    <div class="progress-bar" id="progress-bar-container"><div class="progress-fill" id="progress-fill"></div></div>

    <div id="login-screen" style="display: none;">
        <div class="input-group">
            <label style="font-weight: 600;">Adınız:</label>
            <input type="text" id="username-input" class="input-control" placeholder="Örn: Ahmet">
        </div>
        <div class="input-group">
            <label style="font-weight: 600;">Soyadınız:</label>
            <input type="text" id="usersurname-input" class="input-control" placeholder="Örn: Yılmaz">
        </div>
        <div class="input-group">
            <label style="font-weight: 600;">Cinsiyetiniz:</label>
            <select id="usergender-input" class="input-control">
                <option value="">Seçiniz...</option>
                <option value="Erkek">Erkek</option>
                <option value="Kadın">Kadın</option>
            </select>
        </div>
        <div class="input-group">
            <label style="font-weight: 600;">Uçuş Okulunuz:</label>
            <select id="userschool-input" class="input-control">
                <option value="">Seçiniz...</option>
                <option value="Atlantik Uçuş Okulu">Atlantik Uçuş Okulu</option>
                <option value="Asya Uçuş Okulu">Asya Uçuş Okulu</option>
                <option value="Fenix Uçuş Okulu">Fenix Uçuş Okulu</option>
            </select>
        </div>
        <button class="input-control input-btn" onclick="saveUser()">Sınav Sistemine Giriş Yap</button>
    </div>

    <div id="aircraft-selector" style="display: none;">
        <div id="welcome-msg" class="user-welcome"></div>
        <div class="options">
            <button class="btn aircraft-btn" onclick="showSubCategories('Aquila A211')">Aquila A211</button>
            <button class="btn aircraft-btn" disabled title="Yapım Aşamasındadır">Diamond DA20 Eclipse (Yapım Aşamasında)</button>
            <button class="btn aircraft-btn" onclick="showSubCategories('Diamond DA40 NG')">Diamond DA40 NG</button>
            <button class="btn aircraft-btn" disabled title="Yapım Aşamasındadır">Diamond DA42 Twin Star (Yapım Aşamasında)</button>
        </div>
        
        <div class="insight-badge" id="weakness-insight-box"></div>

        <div class="stats-panel" id="stats-panel" style="display: none;">
            <div class="stats-title">📊 Son 5 Test Performans Grafiğiniz (%)</div>
            <canvas id="stats-canvas" height="150"></canvas>
        </div>
    </div>

    <div id="subcategory-selector" style="display: none;">
        <div id="subcategory-welcome-title" class="user-welcome" style="font-weight:700; color:var(--primary-color);">Sınav Bölümü Seçiniz</div>
        <div class="options" id="subcategory-buttons-container"></div>
    </div>

    <div id="quiz-body" style="display: none;">
        <div class="question" id="question-text"></div>
        <div id="options-area">
            <div class="options" id="options-container"></div>
        </div>
        
        <div class="explanation" id="explanation-box"></div>
        
        <div class="nav-controls">
            <button class="nav-btn prev-style" id="prev-btn" onclick="prevQuestion()">Önceki</button>
            <button class="nav-btn pas-style" id="pas-btn" onclick="pasQuestion()">Pas</button>
            <button class="nav-btn flag-style" id="flag-btn" onclick="flagQuestion()">Pin 🚩</button>
            <button class="nav-btn next-style" id="next-btn" onclick="handleNextOrFinish()">Sonraki</button>
        </div>

        <div class="matrix-container" id="matrix-container"></div>
    </div>

    <div id="result-body" class="score-container" style="display: none;">
        <div class="score-title">Sınav Raporu 📋</div>
        <div class="score-number"><span id="score">0</span> / <span id="total">0</span></div>
        <div id="user-score-msg" style="font-weight: 600; margin-bottom: 10px;"></div>
        
        <div style="margin: 20px 0;">
            <canvas id="pie-canvas" width="300" height="200" style="max-width:300px; margin:0 auto;"></canvas>
        </div>

        <div class="category-breakdown" id="category-breakdown-box"></div>

        <button class="cert-btn" id="cert-download-btn" onclick="generateCertificate()">🎖️ Başarı Brövesi & Sertifikasını İndir</button>

        <button class="review-btn" id="review-toggle-btn" onclick="toggleReviewList()">Hataları İncele 🔍</button>
        <div class="review-list" id="review-list-box" style="display:none;"></div>

        <button class="restart-btn" onclick="backToMenu()">Ana Menüye Dön</button>
    </div>
</div>

<div class="footer-signature" onclick="handleSignatureClick()">
    Created by <span style="font-weight: 600; color: #718096;">S.R.Demirer</span>
</div>

<div id="admin-panel" class="admin-panel">
    <div style="font-weight: bold; color: #2d3748; display: flex; justify-content: space-between;">
        <span>📋 Cihaz Sınav Geçmişi (Admin)</span>
        <button onclick="clearAdminLogs()" style="font-size: 0.75rem; cursor: pointer; background: #fed7d7; border: 1px solid #f56565; color: #c53030; border-radius: 4px; padding: 2px 6px;">Temizle</button>
    </div>
    <table class="admin-table">
        <thead>
            <tr>
                <th>Pilot Adı</th>
                <th>A/C</th>
                <th>Skor</th>
                <th>Tarih</th>
            </tr>
        </thead>
        <tbody id="admin-table-body"></tbody>
    </table>
</div>

<script>
    const GOOGLE_SHEETS_URL = "https://script.google.com/macros/s/AKfycbxvMwUIjw_8HTz4bXkw_1SJLejsaWBV7_oL9CBE2g1gIfhadnhmeuivV4tPDSO4Klnj/exec";

    // Diamond DA40 NG %100 Uyumlu 66 Ardışık Soru Veritabanı
    const da40Database = [
        // === BÖLÜM 1: Indicated Airspeeds (18 Soru) ===
        { soru: "What is the Operating Maneuvering Speed Up to 1080 Kg.?", secenekler: ["101 KIAS", "108 KIAS", "113 KIAS", "98 KIAS"], cevap: "101 KIAS", aciklama: "Uçak kütlesi 1080 kg veya altındayken ani kumanda limit hızı 101 KIAS'tır.", cat: "Indicated Airspeeds" },
        { soru: "What is the Operating Maneuvering Speed 1080 Kg. to 1180 Kg.?", secenekler: ["101 KIAS", "108 KIAS", "113 KIAS", "110 KIAS"], cevap: "108 KIAS", aciklama: "1080 - 1180 kg ağırlık bandında güvenli sert kumanda hızı 108 KIAS'tır.", cat: "Indicated Airspeeds" },
        { soru: "What is the Operating Maneuvering Speed Above 1180 Kg.?", secenekler: ["108 KIAS", "113 KIAS", "130 KIAS", "172 KIAS"], cevap: "113 KIAS", aciklama: "Ağır ve yüklü uçakta izin verilen maksimum manevra hızı 113 KIAS'tır.", cat: "Indicated Airspeeds" },
        { soru: "What is the VFE Maximum Flap Extended Speed (Landing)?", secenekler: ["98 KIAS", "110 KIAS", "120 KIAS", "88 KIAS"], cevap: "98 KIAS", aciklama: "İniş tam flap pozisyonundayken uçağın yapısal hız sınırı 98 KIAS'tır.", cat: "Indicated Airspeeds" },
        { soru: "What is the VFE Maximum Flap Extended Speed (Take Off)?", secenekler: ["98 KIAS", "110 KIAS", "120 KIAS", "130 KIAS"], cevap: "110 KIAS", aciklama: "Kalkış kademesinde (T/O) flapların dayanabileceği maksimum sürat 110 KIAS'tır.", cat: "Indicated Airspeeds" },
        { soru: "What is the VNO Maximum Structural Cruising Speed?", secenekler: ["130 KIAS", "172 KIAS", "113 KIAS", "140 KIAS"], cevap: "130 KIAS", aciklama: "Yapısal olarak normal şartlarda aşılmaması gereken seyir hızı sınırı 130 KIAS'tır.", cat: "Indicated Airspeeds" },
        { soru: "What is the VNE Never Exceed Speed?", secenekler: ["130 KIAS", "164 KIAS", "172 KIAS", "180 KIAS"], cevap: "172 KIAS", aciklama: "Asla aşılmaması gereken emniyet kırmızı çizgisi 172 KIAS'tır.", cat: "Indicated Airspeeds" },
        { soru: "What is the Best Glide Speed (Up Flap)?", secenekler: ["78 KIAS", "83 KIAS", "88 KIAS", "92 KIAS"], cevap: "88 KIAS", aciklama: "Flaplar kapalıyken süzülme planlamasındaki en iyi süzülüş açısı sürati 88 KIAS'tır.", cat: "Indicated Airspeeds" },
        { soru: "What is the Approach Speed (Up Flap) (Emergency / Normal)?", secenekler: ["88 KIAS", "83 KIAS", "78 KIAS", "77 KIAS"], cevap: "83 KIAS", aciklama: "Flaps UP yaklaşma sürat standardı 83 KIAS'tır.", cat: "Indicated Airspeeds" },
        { soru: "What is the Approach Speed (Take Off) (Emergency / Normal)?", secenekler: ["83 KIAS", "78 KIAS", "77 KIAS", "72 KIAS"], cevap: "78 KIAS", aciklama: "Kalkış kademesinde (T/O) normal veya acil yaklaşma sürati 78 KIAS'tır.", cat: "Indicated Airspeeds" },
        { soru: "What is the Approach Speed (Landing) (Emergency / Normal)?", secenekler: ["78 KIAS", "77 KIAS", "72 KIAS", "70 KIAS"], cevap: "77 KIAS", aciklama: "Full iniş flaplarında son yaklaşma muhafaza sürati 77 KIAS'tır.", cat: "Indicated Airspeeds" },

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playBeep(freq, type, duration) {
        try {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        } catch(e) {}
    }

    function generateWeaknessInsight() {
        const history = JSON.parse(localStorage.getItem('quiz_history')) || [];
        if (history.length === 0 || !localStorage.getItem('cat_errors')) {
            weaknessInsightBox.style.display = 'none';
            return;
        }
        
        const errors = JSON.parse(localStorage.getItem('cat_errors')) || {};
        let worstCategory = "";
        let maxErrors = 0;

        for (const [cat, count] of Object.entries(errors)) {
            if (count > maxErrors) {
                maxErrors = count;
                worstCategory = cat;
            }
        }

        if (maxErrors > 1) {
            weaknessInsightBox.innerHTML = `⚠️ <strong>Uçuş Emniyet Notu:</strong> Son test analizlerine göre <strong>"${worstCategory}"</strong> konusundaki limitlerde hata oranınız yüksektir. Bu bölüme ağırlık vermeniz önerilir.`;
            weaknessInsightBox.style.display = 'block';
        } else {
            weaknessInsightBox.style.display = 'none';
        }
    }

                maydayTriggered = true;
                playBeep(600, 'sine', 0.4);
                openTrollModal("🚨 MAYDAY! ACİL DURUM 🚨", "Mayday Mayday! Yakıt kritiğe girdi, kule acil iniş izni verdi ama sen hala sorudasın! Azıcık gaz aç! ⏱️");
            }
            
            if (timeLeft <= 30 && timeLeft % 2 === 0) playBeep(880, 'sine', 0.1);
            if (timeLeft <= 0) {
                clearInterval(quizTimerInterval);
                playBeep(440, 'sawtooth', 0.8);
                alert("Süre Sınırı Doldu! Sınavınız Otomatik Kilitleniyor.");
                showResult();

    function buildMatrix() {
        matrixContainer.innerHTML = '';
        questionStates.forEach((_, idx) => {
            const box = document.createElement('div');
            box.classList.add('matrix-box');
            box.innerText = idx + 1;
            box.addEventListener('click', () => jumpToQuestion(idx));
            matrixContainer.appendChild(box);
        });
    }

    function updateMatrixUI() {
        const boxes = matrixContainer.querySelectorAll('.matrix-box');
        boxes.forEach((box, idx) => {
            box.classList.remove('active', 'm-correct', 'm-wrong', 'm-pas', 'm-flag');
            if (idx === currentQuestionIndex) box.classList.add('active');
            if (questionStates[idx].status === 'correct') box.classList.add('m-correct');
            else if (questionStates[idx].status === 'wrong') box.classList.add('m-wrong');
            else if (questionStates[idx].status === 'pas') box.classList.add('m-pas');
            else if (questionStates[idx].status === 'flagged') box.classList.add('m-flag');
        });
    }

    function jumpToQuestion(idx) {
        currentQuestionIndex = idx;
        loadQuestion();
    }

    function loadQuestion() {
        explanationBox.style.display = 'none';
        optionsContainer.innerHTML = '';
        
        const activeDatabase = (selectedAircraft === 'Diamond DA40 NG') ? da40Database : aquilaDatabase;
        let currentQuestion = activeDatabase.find(q => q.soru === activeQuestions[currentQuestionIndex].soru);
        let state = questionStates[currentQuestionIndex];
        
        questionCounter.innerText = `${selectedCategory} - Soru ${currentQuestionIndex + 1} / ${activeQuestions.length}`;
        const answeredCount = questionStates.filter(s => s.status !== 'unanswered' && s.status !== 'flagged').length;
        const progressPercent = (answeredCount / activeQuestions.length) * 100;
        progressFill.style.width = `${progressPercent}%`;

        questionText.innerHTML = currentQuestion.soru;
        
        let randomizedOptions = [...currentQuestion.secenekler].sort(() => Math.random() - 0.5);
        const prefixMap = ['A) ', 'B) ', 'C) ', 'D) '];

        randomizedOptions.forEach((option, oIdx) => {
            const button = document.createElement('button');
            const prefix = prefixMap[oIdx] || '';
            button.innerText = prefix + option;
            button.classList.add('btn');
            
            if (state.status === 'unanswered' || state.status === 'flagged') {
                button.addEventListener('click', () => checkMultipleChoice(button, option, currentQuestion.cevap, currentQuestion.aciklama));
            } else {
                button.disabled = true;
                if (option === currentQuestion.cevap) button.classList.add('correct');
                if (state.status === 'wrong' && option === state.userA) button.classList.add('wrong');
            }
            optionsContainer.appendChild(button);
        });

        if(state.status !== 'unanswered' && state.status !== 'flagged') {
            showExplanationStatic(state.status === 'correct', currentQuestion.cevap, currentQuestion.aciklama);
        }
        prevBtn.disabled = (currentQuestionIndex === 0);
        
        if (currentQuestionIndex === activeQuestions.length - 1) {
            nextBtn.innerText = "Sınavı Bitir";
            nextBtn.className = "nav-btn finish-style";
        } else {
            nextBtn.innerText = "Sonraki";
            nextBtn.className = "nav-btn next-style";
        }
        updateMatrixUI();
    }

    function checkMultipleChoice(selectedBtn, selectedOption, correctAnswer, aciklama) {
        let state = questionStates[currentQuestionIndex];
        let currentQuestion = activeQuestions[currentQuestionIndex];
        state.userA = selectedOption;
        
        const buttons = optionsContainer.querySelectorAll('.btn');
        buttons.forEach(btn => btn.disabled = true);

        if (selectedOption === correctAnswer) {
            state.status = 'correct';
            selectedBtn.classList.add('correct');
            playBeep(1200, 'sine', 0.15);
            
            consecutiveWrong = 0;
            consecutiveCorrect++;
            
            if (consecutiveCorrect === 20) {
                openTrollModal("😎 KAPTAN MODU AKTİF 😎", "20 Peşpeşe Doğru! Kaptan Pilot gibi uçuyorsun! Motor sıcaklığı stabil, rüzgar tam karşıdan. Şov yapma, emniyetle devam et! 😎");
            }
            
        } else {
            state.status = 'wrong';
            selectedBtn.classList.add('wrong');
            buttons.forEach(btn => {
                const optionTextWithoutPrefix = btn.innerText.substring(3);
                if(optionTextWithoutPrefix === correctAnswer) btn.classList.add('correct');
            });
            playBeep(250, 'square', 0.3);
            logCategoryError(currentQuestion.cat);
            
            consecutiveCorrect = 0;
            consecutiveWrong++;
            
            if (consecutiveWrong === 2) {
                openTrollModal("⚠️ KOKPİT İKAZI ⚠️", "Arka Arkaya 2 Yanlış! Sanırım Stall'a giriyorsun kaptan? ✈️");
            } else if (consecutiveWrong === 3) {
                openTrollModal("🚨 MASTER CAUTION 🚨", "Maşallah Soluksuz 3 Yanlış! SOP'yi Hiç Okumamışsın! 🚨");
            }
        }
        showExplanationStatic(state.status === 'correct', correctAnswer, aciklama);
        updateMatrixUI();
    }

    function flagQuestion() {
        let state = questionStates[currentQuestionIndex];
        if (state.status === 'unanswered') state.status = 'flagged';
        else if (state.status === 'flagged') state.status = 'unanswered';
        updateMatrixUI();
        handleNextOrFinish();
    }

    function logCategoryError(category) {
        let errors = JSON.parse(localStorage.getItem('cat_errors')) || {};
        errors[category] = (errors[category] || 0) + 1;
        localStorage.setItem('cat_errors', JSON.stringify(errors));
    }

    function showExplanationStatic(isCorrect, rightAnswer, text) {
        explanationBox.innerHTML = `<strong>${isCorrect ? 'Doğru! ✔️' : 'Yanlış! ❌'}</strong> Doğru Cevap: ${rightAnswer}<br>${text}`;
        explanationBox.style.display = 'block';
    }

    function prevQuestion() {
        if (currentQuestionIndex > 0) {
            currentQuestionIndex--;
            loadQuestion();
        }
    }

    function pasQuestion() {
        let state = questionStates[currentQuestionIndex];
        if(state.status === 'unanswered' || state.status === 'flagged') {
            state.status = 'pas';
            state.userA = '';
            consecutiveCorrect = 0;
            consecutiveWrong = 0;
        }
        handleNextOrFinish();
    }

    function handleNextOrFinish() {
        if (currentQuestionIndex < activeQuestions.length - 1) {
            currentQuestionIndex++;
            loadQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        clearInterval(quizTimerInterval);
        quizTimerView.style.display = 'none';
        quizBody.style.display = 'none';
        progressBarContainer.style.display = 'none';
        questionCounter.style.display = 'none';
        
        let correctCount = questionStates.filter(s => s.status === 'correct').length;
        let wrongCount = questionStates.filter(s => s.status === 'wrong').length;
        let pasCount = questionStates.filter(s => s.status === 'pas' || s.status === 'unanswered' || s.status === 'flagged').length;
        
        const percentage = Math.round((correctCount / activeQuestions.length) * 100);
        const testDate = new Date().toLocaleDateString('tr-TR', {hour: '2-digit', minute:'2-digit'});
        
        const acLabel = (selectedAircraft === 'Diamond DA40 NG') ? 'DA40' : 'A211';
        saveHistory(`${acLabel}-${selectedCategory.substring(0,5).toUpperCase()}`, percentage);
        sendDataToCloud(currentName, currentSurname, currentGender, currentSchool, `${selectedAircraft} (${selectedCategory})`, percentage, testDate);

        resultBody.style.display = 'block';
        document.getElementById('score').innerText = correctCount;
        document.getElementById('total').innerText = activeQuestions.length;
        userScoreMsg.innerText = `${currentSchool} Pilotu Sayın ${currentName} ${currentSurname}, Sınav Başarı Oranınız: %${percentage}`;
        
        if (percentage >= 80 && selectedCategory === 'General') {
            certDownloadBtn.style.display = 'block';
        }

        calculateCategoryMetrics();
        buildReviewList();

        setTimeout(() => {
            renderPieChart(correctCount, wrongCount, pasCount);
        }, 150);
    }

    function sendDataToCloud(name, surname, gender, school, aircraft, score, date) {
        if(!GOOGLE_SHEETS_URL) return;
        const payload = { name, surname, gender, flightSchool: school, aircraft, score, date };
        fetch(GOOGLE_SHEETS_URL, {
            method: "POST",
            mode: "no-cors",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        }).catch(err => console.log("Bulut gönderim hatası: ", err));
    }

    function calculateCategoryMetrics() {
        const catData = {};
        activeQuestions.forEach((q, idx) => {
            const category = q.cat || "Genel Havacılık";
            if (!catData[category]) catData[category] = { total: 0, correct: 0 };
            catData[category].total++;
            if (questionStates[idx].status === 'correct') catData[category].correct++;
        });

        let html = `<div class="stats-title">🎯 Konu Bazlı Başarı Analizi</div>`;
        for (const [catName, metrics] of Object.entries(catData)) {
            const pct = Math.round((metrics.correct / metrics.total) * 100);
            html += `
                <div class="category-item">
                    <span>${catName} (${metrics.correct}/${metrics.total})</span>
                    <span style="font-weight:bold; color:${pct >= 75 ? '#2f855a' : '#c53030'}">%${pct}</span>
                </div>
            `;
        }
        categoryBreakdownBox.innerHTML = html;
    }

    function buildReviewList() {
        reviewListBox.innerHTML = '';
        let wrongQuestions = activeQuestions.filter((_, idx) => questionStates[idx].status === 'wrong');
        if (wrongQuestions.length === 0) {
            reviewListBox.innerHTML = `<div style="color:#2f855a; font-weight:600; text-align:center;">Harika! Hiç yanlışınız bulunmuyor. 🎉</div>`;
            return;
        }

        activeQuestions.forEach((q, idx) => {
            if (questionStates[idx].status === 'wrong') {
                const item = document.createElement('div');
                item.classList.add('review-item');
                item.innerHTML = `
                    <strong style="color:#c53030;">Soru:</strong> ${q.soru}<br>
                    <span style="color:#e53e3e;">Sizin Cevabınız: ${questionStates[idx].userA || 'Boş'}</span><br>
                    <span style="color:#2f855a; font-weight:600;">Doğru Cevap: ${q.cevap}</span><br>
                    <small style="color:#3182ce; font-style:italic;">Açıklama: ${q.aciklama}</small>
                `;
                reviewListBox.appendChild(item);
            }
        });
    }

    function toggleReviewList() {
        if (reviewListBox.style.display === 'none') {
            reviewListBox.style.display = 'block';
            document.getElementById('review-toggle-btn').innerText = "Listeyi Gizle 🔼";
        } else {
            reviewListBox.style.display = 'none';
            document.getElementById('review-toggle-btn').innerText = "Hataları İncele 🔍";
        }
    }

    function renderPieChart(correct, wrong, pas) {
        const canvas = document.getElementById('pie-canvas');
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        const total = correct + wrong + pas;
        if(total === 0) return;

        const data = [correct, wrong, pas];
        const colors = ['#48bb78', '#f56565', '#a0aec0']; 
        const labels = ['Doğru', 'Yanlış', 'Boş/Pas/Flag'];

        let centerX = 100;
        let centerY = 100;
        let radius = 75;
        let startAngle = 0;

        for (let i = 0; i < data.length; i++) {
            if(data[i] === 0) continue;
            let sliceAngle = (data[i] / total) * 2 * Math.PI;
            ctx.beginPath();
            ctx.fillStyle = colors[i];
            ctx.moveTo(centerX, centerY);
            ctx.arc(centerX, centerY, radius, startAngle, startAngle + sliceAngle);
            ctx.closePath();
            ctx.fill();
            startAngle += sliceAngle;
        }

        ctx.font = '12px Arial';
        let legendX = 200;
        let legendY = 50;

        for (let i = 0; i < data.length; i++) {
            ctx.fillStyle = colors[i];
            ctx.fillRect(legendX, legendY + (i * 25), 15, 15);
            ctx.fillStyle = document.documentElement.getAttribute('data-theme') === 'exam' ? '#edf2f7' : '#4a5568';
            ctx.fillText(`${labels[i]}: ${data[i]}`, legendX + 22, legendY + 12 + (i * 25));
        }
    }

    function backToMenu() { showMainMenu(); }

    function saveHistory(acLabel, pct) {
        let history = JSON.parse(localStorage.getItem('quiz_history')) || [];
        const newRecord = {
            pilot: `${currentName} ${currentSurname}`, 
            aircraft: acLabel,
            score: pct,
            date: new Date().toLocaleDateString('tr-TR', {hour: '2-digit', minute:'2-digit'})
        };
        history.push(newRecord);
        localStorage.setItem('quiz_history', JSON.stringify(history));
    }

    function handleSignatureClick() {
        signatureClickCount++;
        if (signatureClickCount === 3) {
            if (adminPanel.style.display === 'none' || adminPanel.style.display === '') {
                updateAdminTable();
                adminPanel.style.display = 'block';
                adminPanel.scrollIntoView({ behavior: 'smooth' });
            } else {
                adminPanel.style.display = 'none';
            }
            signatureClickCount = 0;
        }
    }

    function updateAdminTable() {
        const history = JSON.parse(localStorage.getItem('quiz_history')) || [];
        adminTableBody.innerHTML = '';
        if(history.length === 0) {
            adminTableBody.innerHTML = `<tr><td colspan="4" style="text-align:center; color:#a0aec0;">Henüz sınav kaydı bulunmuyor.</td></tr>`;
            return;
        }
        [...history].reverse().forEach(log => {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td style="font-weight:600;">${log.pilot || 'Bilinmeyen'}</td>
                <td>${log.aircraft}</td>
                <td style="font-weight:bold; color:${log.score >= 75 ? '#2f855a' : '#c53030'}">%${log.score}</td>
                <td>${log.date}</td>
            `;
            log.date ? row.innerHTML += `` : ''; // Güvenli akış kontrolü
            adminTableBody.appendChild(row);
        });
    }

    function clearAdminLogs() {
        if(confirm("Tüm kullanıcı sınav geçmişini silmek istediğinize emin misiniz?")) {
            localStorage.removeItem('quiz_history');
            localStorage.removeItem('cat_errors');
            updateAdminTable();
            drawChart();
        }
    }

    function drawChart() {
        const history = JSON.parse(localStorage.getItem('quiz_history')) || [];
        const canvas = document.getElementById('stats-canvas');
        const statsPanel = document.getElementById('stats-panel');
        if (history.length === 0) {
            statsPanel.style.display = 'none';
            return;
        }
        statsPanel.style.display = 'block';
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        const padding = 30;
        const chartWidth = canvas.width - padding * 2;
        const chartHeight = canvas.height - padding * 2;
        
        ctx.beginPath();
        ctx.strokeStyle = '#cbd5e0';
        ctx.lineWidth = 1;
        ctx.moveTo(padding, padding);
        ctx.lineTo(padding, canvas.height - padding);
        ctx.lineTo(canvas.width - padding, canvas.height - padding);
        ctx.stroke();

        const points = [];
        const displayHistory = history.slice(-5);
        const stepX = displayHistory.length > 1 ? chartWidth / (displayHistory.length - 1) : chartWidth;

        displayHistory.forEach((data, index) => {
            const x = padding + (index * stepX);
            const y = (canvas.height - padding) - (data.score / 100 * chartHeight);
            points.push({x, y, label: data.aircraft, score: data.score});
        });

        if (points.length > 0) {
            ctx.beginPath();
            ctx.strokeStyle = '#328cc1';
            ctx.lineWidth = 3;
            ctx.moveTo(points[0].x, points[0].y);
            for(let i=1; i<points.length; i++) ctx.lineTo(points[i].x, points[i].y);
            ctx.stroke();
        }

        points.forEach(p => {
            ctx.beginPath();
            ctx.fillStyle = '#0b3c5d';
            ctx.arc(p.x, p.y, 5, 0, Math.PI * 2);
            ctx.fill();
            ctx.font = 'bold 9px Arial';
            ctx.fillStyle = '#4a5568';
            ctx.fillText(`%${p.score}`, p.x - 8, p.y - 10);
            ctx.font = '8px Arial';
            ctx.fillText(p.label, p.x - 12, canvas.height - padding + 15);
        });
    }

    function wrapText(context, text, x, y, maxWidth, lineHeight) {
        var words = text.split(' ');
        var line = '';
        for (var n = 0; n < words.length; n++) {
            var testLine = line + words[n] + ' ';
            var metrics = context.measureText(testLine);
            var testWidth = metrics.width;
            if (testWidth > maxWidth && n > 0) {
                context.fillText(line, x, y);
                line = words[n] + ' ';
                y += lineHeight;
            } else {
                line = testLine;
            }
        }
        context.fillText(line, x, y);
        return y;
    }

    function generateCertificate() {
        const canvas = document.createElement('canvas');
        canvas.width = 850;
        canvas.height = 680;
        const ctx = canvas.getContext('2d');

        const grad = ctx.createLinearGradient(0, 0, 850, 680);
        grad.addColorStop(0, '#0b3c5d');
        grad.addColorStop(1, '#1d2731');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, 850, 680);

        ctx.strokeStyle = '#d4af37';
        ctx.lineWidth = 10;
        ctx.strokeRect(40, 40, 770, 600);
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 2;
        ctx.strokeRect(55, 55, 740, 570);

        ctx.textAlign = 'center';
        ctx.fillStyle = '#d4af37';
        ctx.font = 'bold 34px Georgia';
        ctx.fillText('Limit Proseförü', 425, 120);

        ctx.fillStyle = '#90cdf4';
        ctx.font = 'bold 36px Helvetica';
        ctx.fillText(`${currentName.toUpperCase()} ${currentSurname.toUpperCase()}`, 425, 190);

        ctx.fillStyle = '#ffffff';
        ctx.font = '15px Arial';
        
        const mainText = `Bu belge, seçmiş olduğu ${selectedAircraft.toUpperCase()} uçağının motorunu yakmadan, kanatlarını eline almadan, kokpitteki Master Caution ışıklarını yakıp uçağı ''Gece Kulübüne'' çevirmeden uçabileceğini gösterir. Uçağı limitlerinde emniyetle uçurmanız tamamen kendi hayatta kalma içgüdünüzle ve edeceğiniz duaların gücüyle alakalıdır.`;
        
        let lastY = wrapText(ctx, mainText, 425, 240, 680, 24);

        ctx.fillStyle = '#d4af37';
        ctx.font = 'bold 24px Arial';
        ctx.fillText(`${pilotEmoji}   Başarı Belgesi   ${pilotEmoji}`, 425, lastY + 50);

        ctx.fillStyle = '#fc8181';
        ctx.font = 'bold 11px Arial';
        
        const disclaimerText = `⚠️ Yasal Uyarı: Bu belge tamamen eğlence amacıyla üretilmiştir. Öğretmenlerinize göstermeniz durumunda lisansınızın askıya alınması, meydandan kovulmanıza veya en hafifinden " Senden Pilot Olmaz !! " bakışlarına maruz kalmanıza sebep olur. `;
        
        wrapText(ctx, disclaimerText, 425, lastY + 100, 700, 16);

        const link = document.createElement('a');
        link.download = `${currentName}_${currentSurname}_Limit_Sertifikasi.png`;
        link.href = canvas.toDataURL();
        link.click();
    }
</script>
