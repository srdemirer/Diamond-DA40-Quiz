<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uçak Limitleri Testi</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: #f0f4f8;
            color: #1a202c;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 15px;
        }
        .quiz-container {
            background-color: #ffffff;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            padding: 25px;
            max-width: 550px;
            width: 100%;
        }
        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { color: #0b3c5d; font-size: 1.5rem; margin: 0 0 5px 0; }
        .header p { color: #718096; margin: 0; font-size: 0.9rem; }
        .progress-bar { height: 6px; background-color: #e2e8f0; border-radius: 3px; margin-bottom: 25px; overflow: hidden; display: none;}
        .progress-fill { height: 100%; background-color: #328cc1; width: 0%; transition: width 0.3s ease; }
        .options { display: flex; flex-direction: column; gap: 12px; }
        .btn {
            background-color: #f7fafc; border: 2px solid #e2e8f0; padding: 14px 18px;
            border-radius: 10px; cursor: pointer; font-size: 1rem; font-weight: 500;
            text-align: left; color: #4a5568; transition: all 0.2s ease; -webkit-tap-highlight-color: transparent;
        }
        .btn:hover:not([disabled]) { background-color: #edf2f7; border-color: #cbd5e0; }
        
        /* Aktif Uçak Buton Modeli */
        .aircraft-btn { background-color: #e3fafc; border-color: #99e9f2; color: #0c8599; text-align: center; font-weight: 600;}
        .aircraft-btn:hover:not([disabled]) { background-color: #c5f6fa !important; }
        
        /* Pasif Uçak Buton Modeli */
        .aircraft-btn:disabled {
            background-color: #edf2f7 !important;
            border-color: #e2e8f0 !important;
            color: #a0aec0 !important;
            cursor: not-allowed !important;
            opacity: 0.7;
        }
        
        .correct { background-color: #c6f6d5 !important; border-color: #48bb78 !important; color: #22543d !important; font-weight: 600; }
        .wrong { background-color: #fed7d7 !important; border-color: #f56565 !important; color: #742a2a !important; font-weight: 600; }
        
        .explanation { margin-top: 20px; padding: 15px; background-color: #ebf8ff; border-left: 4px solid #3182ce; border-radius: 4px; font-size: 0.95rem; line-height: 1.5; color: #2b6cb0; display: none; }
        
        /* Navigasyon Buton Grubu */
        .nav-controls { display: flex; gap: 10px; margin-top: 20px; }
        .nav-btn { flex: 1; padding: 12px; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; text-align: center; font-size: 0.95rem; }
        .prev-style { background-color: #e2e8f0; color: #4a5568; }
        .prev-style:hover:not([disabled]) { background-color: #cbd5e0; }
        .prev-style:disabled { opacity: 0.5; cursor: not-allowed; }
        .pas-style { background-color: #a0aec0; color: white; }
        .pas-style:hover { background-color: #718096; }
        .next-style { background-color: #0b3c5d; color: white; box-shadow: 0 4px 6px rgba(11, 60, 93, 0.2); }
        .next-style:hover { background-color: #082d47; }
        .finish-style { background-color: #2f855a; color: white; }
        .finish-style:hover { background-color: #22543d; }

        /* Soru Navigasyon Matrisi */
        .matrix-container { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 25px; padding-top: 15px; border-top: 1px solid #e2e8f0; justify-content: center; }
        .matrix-box { width: 26px; height: 26px; border-radius: 6px; border: 1px solid #cbd5e0; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 600; cursor: pointer; background-color: white; user-select: none; }
        .matrix-box.active { border: 2px solid #328cc1; transform: scale(1.1); }
        .matrix-box.m-correct { background-color: #48bb78; color: white; border-color: #38a169; }
        .matrix-box.m-wrong { background-color: #f56565; color: white; border-color: #e53e3e; }
        .matrix-box.m-pas { background-color: #a0aec0; color: white; border-color: #718096; }

        /* Boşluk Doldurma Düzeni */
        .text-input-container { display: flex; flex-direction: column; gap: 10px; margin: 15px 0; }
        .text-answer-input { width: 100%; padding: 14px; border: 2px solid #cbd5e0; border-radius: 10px; font-size: 1.05rem; font-weight: 500; }
        .text-answer-submit { background-color: #328cc1; color: white; border: none; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; }

        .score-container { text-align: center; padding: 10px 0; }
        .score-title { font-size: 1.4rem; font-weight: bold; color: #2d3748; margin-bottom: 10px; }
        .score-number { font-size: 3rem; font-weight: 800; color: #328cc1; margin-bottom: 20px; }
        .restart-btn { background-color: #328cc1; color: white; border: none; padding: 12px 25px; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: 15px;}
        
        .input-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; }
        .input-control { padding: 14px; border-radius: 10px; border: 2px solid #e2e8f0; font-size: 1rem; }
        .input-btn { background-color: #0b3c5d; color: white; border: none; font-weight: bold; cursor: pointer; }
        .stats-panel { margin-top: 25px; border-top: 2px dashed #e2e8f0; padding-top: 20px; text-align: left; }
        .stats-title { font-weight: bold; color: #4a5568; margin-bottom: 10px; font-size: 1.1rem; }
        #stats-canvas, #pie-canvas { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; width: 100%; margin-top: 10px; }
        .user-welcome { font-size: 0.95rem; color: #4a5568; margin-bottom: 15px; font-weight: 600; text-align: center; }
        
        .question { font-size: 1.15rem; font-weight: 600; margin-bottom: 24px; padding-bottom: 12px; }
        .footer-signature { font-size: 0.75rem; color: #a0aec0; margin-top: 25px; text-align: center; user-select: none; cursor: pointer; }
        
        .admin-panel { background: white; border-radius: 12px; padding: 15px; margin-top: 15px; width: 100%; max-width: 550px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); display: none; }
        .admin-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.85rem; }
        .admin-table th, .admin-table td { border: 1px solid #e2e8f0; padding: 8px; text-align: left; }
        .admin-table th { background-color: #f7fafc; }
    </style>
</head>
<body>

<div class="quiz-container">
    <div class="header">
        <h1 id="main-title">Uçak Limitleri Testi ✈️</h1>
        <p id="question-counter">Sistem Başlatılıyor...</p>
    </div>
    
    <div class="progress-bar" id="progress-bar-container"><div class="progress-fill" id="progress-fill"></div></div>

    <div id="login-screen" style="display: none;">
        <div class="input-group">
            <label style="font-weight: 600; color: #4a5568;">Lütfen Adınızı ve Soyadınızı Girin:</label>
            <input type="text" id="username-input" class="input-control" placeholder="Örn: Ahmet Yılmaz">
            <button class="input-control input-btn" onclick="saveUser()">Portala Giriş Yap</button>
        </div>
    </div>

    <div id="aircraft-selector" style="display: none;">
        <div id="welcome-msg" class="user-welcome"></div>
        <div class="options">
            <button class="btn aircraft-btn" disabled title="Yapım Aşamasındadır">Aquila A211 (Yapım Aşamasında)</button>
            <button class="btn aircraft-btn" disabled title="Yapım Aşamasındadır">Diamond DA20 Eclipse (Yapım Aşamasında)</button>
            <button class="btn aircraft-btn" onclick="startQuiz('da40')">Diamond DA40 NG</button>
            <button class="btn aircraft-btn" disabled title="Yapım Aşamasındadır">Diamond DA42 Twin Star (Yapım Aşamasında)</button>
        </div>
        
        <div class="stats-panel" id="stats-panel" style="display: none;">
            <div class="stats-title">📊 Son 5 Test Performans Grafiğiniz (%)</div>
            <canvas id="stats-canvas" height="150"></canvas>
        </div>
    </div>

    <div id="quiz-body" style="display: none;">
        <div class="question" id="question-text"></div>
        <div id="options-area">
            <div class="options" id="options-container"></div>
        </div>
        
        <div class="explanation" id="explanation-box"></div>
        
        <div class="nav-controls">
            <button class="nav-btn prev-style" id="prev-btn" onclick="prevQuestion()">Önceki</button>
            <button class="nav-btn pas-style" id="pas-btn" onclick="pasQuestion()">PAS</button>
            <button class="nav-btn next-style" id="next-btn" onclick="handleNextOrFinish()">Sonraki</button>
        </div>

        <div class="matrix-container" id="matrix-container"></div>
    </div>

    <div id="result-body" class="score-container" style="display: none;">
        <div class="score-title">Test Tamamlandı! 🎉</div>
        <div class="score-number"><span id="score">0</span> / <span id="total">0</span></div>
        <div id="user-score-msg" style="font-weight: 600; color: #4a5568; margin-bottom: 10px;"></div>
        
        <div style="margin: 20px 0;">
            <canvas id="pie-canvas" width="300" height="200" style="max-width:300px; margin:0 auto;"></canvas>
        </div>

        <button class="restart-btn" onclick="backToMenu()">Ana Menüye Dön</button>
    </div>
</div>

<div class="footer-signature" onclick="handleSignatureClick()">
    Created by <span style="font-weight: 600; color: #718096;">S.R.Demirer</span>
</div>

<div id="admin-panel" class="admin-panel">
    <div style="font-weight: bold; color: #2d3748; display: flex; justify-content: space-between;">
        <span>📋 Cihaz Sınav Geçmişi (Admin)</span>
        <button onclick="clearAdminLogs()" style="font-size: 0.75rem; cursor: pointer; background: #fed7d7; border: 1px solid #f56565; color: #c53030; border-radius: 4px; padding: 2px 6px;">Temizle</button>
    </div>
    <table class="admin-table">
        <thead>
            <tr>
                <th>Pilot Adı</th>
                <th>A/C</th>
                <th>Skor</th>
                <th>Tarih</th>
            </tr>
        </thead>
        <tbody id="admin-table-body"></tbody>
    </table>
</div>

<script>

            { soru: "Tavsiye Edilen Yaklaşma Sürati Kaçtır?(Take Off Flap)", secenekler: ["83 KIAS", "78 KIAS", "77 KIAS", "72 KIAS"], cevap: "78 KIAS", aciklama: "Flaps T/O kademesinde tavsiye edilen yaklaşma sürati 78 KIAS'tır." },
            { soru: "Tavsiye Edilen Yaklaşma Sürati Kaçtır?(Landing Flap)", secenekler: ["78 KIAS", "77 KIAS", "72 KIAS", "70 KIAS"], cevap: "77 KIAS", aciklama: "Landing flapları ile normal yaklaşma hızı 77 KIAS'tır." },
            { soru: "1080 KG Kalkış Ağırlığı İçin Manevra Sürati Kaçtır?", secenekler: ["101 KIAS", "108 KIAS", "113 KIAS", "98 KIAS"], cevap: "101 KIAS", aciklama: "Hafif uçakta ani kumanda limit hızı (Va) 101 KIAS'a düşer." },
            { soru: "1080 - 1180 KG Kalkış Ağırlığı İçin Manevra Sürati Kaçtır?", secenekler: ["101 KIAS", "108 KIAS", "113 KIAS", "105 KIAS"], cevap: "108 KIAS", aciklama: "Orta ağırlık bandında manevra sürati Va 108 KIAS'tır." },
            { soru: "1180+ KG Kalkış Ağırlığı İçin Manevra Sürati Kaçtır?", secenekler: ["101 KIAS", "108 KIAS", "113 KIAS", "120 KIAS"], cevap: "113 KIAS", aciklama: "Tam yüklü ağır uçakta en yüksek Va limiti 113 KIAS'tır." }
        ],
        a211: [],
        da20: [],
        da42: []
    };

    let activeQuestions = [];
    let currentQuestionIndex = 0;
    let currentUser = "";
    let selectedAircraft = "";
    let signatureClickCount = 0;
    let questionStates = []; 

    const loginScreen = document.getElementById('login-screen');
    const aircraftSelector = document.getElementById('aircraft-selector');
    const quizBody = document.getElementById('quiz-body');
    const resultBody = document.getElementById('result-body');
    const questionText = document.getElementById('question-text');
    const optionsContainer = document.getElementById('options-container');
    const explanationBox = document.getElementById('explanation-box');
    const questionCounter = document.getElementById('question-counter');
    const progressFill = document.getElementById('progress-fill');
    const progressBarContainer = document.getElementById('progress-bar-container');
    const mainTitle = document.getElementById('main-title');
    const welcomeMsg = document.getElementById('welcome-msg');
    const userScoreMsg = document.getElementById('user-score-msg');
    const adminPanel = document.getElementById('admin-panel');
    const adminTableBody = document.getElementById('admin-table-body');
    const matrixContainer = document.getElementById('matrix-container');
    
    const prevBtn = document.getElementById('prev-btn');
    const pasBtn = document.getElementById('pas-btn');
    const nextBtn = document.getElementById('next-btn');

    window.onload = function() {
        const storedUser = localStorage.getItem('pilot_name');
        if (storedUser) {
            currentUser = storedUser;
            showMainMenu();
        } else {
            showLoginScreen();
        }
    };

    function showLoginScreen() {
        mainTitle.innerText = "Uçak Limitleri Testi ✈️";
        questionCounter.innerText = "Kullanıcı Kaydı Gerekli";
        loginScreen.style.display = 'block';
        aircraftSelector.style.display = 'none';
        quizBody.style.display = 'none';
    }

    function saveUser() {
        const nameInput = document.getElementById('username-input').value.trim();
        if(nameInput === "") {
            alert("Lütfen geçerli bir ad soyad girin!");
            return;
        }
        localStorage.setItem('pilot_name', nameInput);
        currentUser = nameInput;
        showMainMenu();
    }

    function showMainMenu() {
        loginScreen.style.display = 'none';
        quizBody.style.display = 'none';
        resultBody.style.display = 'none';
        progressBarContainer.style.display = 'none';
        
        mainTitle.innerText = "Uçak Limitleri Testi ✈️";
        questionCounter.innerText = "Lütfen Uçak Tipini Seçiniz";
        questionCounter.style.display = 'block';
        
        welcomeMsg.innerText = `Pilot: ${currentUser} 👩‍✈️👨‍✈️`;
        aircraftSelector.style.display = 'block';
        
        drawChart();
        updateAdminTable();
    }

    function startQuiz(aircraftType) {
        selectedAircraft = aircraftType;
        
        if(aircraftType === 'da40') mainTitle.innerText = "Diamond DA40 NG";

        let rawQuestions = allQuizzes[aircraftType];
        let shuffledPool = [...rawQuestions].sort(() => Math.random() - 0.5);
        let textQuestionCount = Math.min(10, shuffledPool.length);
        
        activeQuestions = shuffledPool.map((q, index) => {
            let isTextType = index < textQuestionCount;
            return {
                ...q,
                isText: isTextType
            };
        });

        activeQuestions.sort(() => Math.random() - 0.5);
        questionStates = activeQuestions.map(() => ({ status: 'unanswered', userA: '' }));
        
        currentQuestionIndex = 0;
        aircraftSelector.style.display = 'none';
        adminPanel.style.display = 'none'; 
        signatureClickCount = 0;
        quizBody.style.display = 'block';
        progressBarContainer.style.display = 'block';

        buildMatrix();
        loadQuestion();
    }

    function buildMatrix() {
        matrixContainer.innerHTML = '';
        questionStates.forEach((_, idx) => {
            const box = document.createElement('div');
            box.classList.add('matrix-box');
            box.innerText = idx + 1;
            box.addEventListener('click', () => jumpToQuestion(idx));
            matrixContainer.appendChild(box);
        });
    }

    function updateMatrixUI() {
        const boxes = matrixContainer.querySelectorAll('.matrix-box');
        boxes.forEach((box, idx) => {
            box.classList.remove('active', 'm-correct', 'm-wrong', 'm-pas');
            
            if (idx === currentQuestionIndex) {
                box.classList.add('active');
            }
            
            if (questionStates[idx].status === 'correct') {
                box.classList.add('m-correct');
            } else if (questionStates[idx].status === 'wrong') {
                box.classList.add('m-wrong');
            } else if (questionStates[idx].status === 'pas') {
                box.classList.add('m-pas');
            }
        });
    }

    function jumpToQuestion(idx) {
        currentQuestionIndex = idx;
        loadQuestion();
    }

    function loadQuestion() {
        explanationBox.style.display = 'none';
        optionsContainer.innerHTML = '';
        
        let currentQuestion = activeQuestions[currentQuestionIndex];
        let state = questionStates[currentQuestionIndex];
        
        questionCounter.innerText = `Soru ${currentQuestionIndex + 1} / ${activeQuestions.length}`;
        const answeredCount = questionStates.filter(s => s.status !== 'unanswered').length;
        const progressPercent = (answeredCount / activeQuestions.length) * 100;
        progressFill.style.width = `${progressPercent}%`;

        questionText.innerHTML = currentQuestion.soru + (currentQuestion.isText ? " <br><small style='color:#328cc1;'>(Lütfen cevabı klavyeyle yazın)</small>" : "");
        
        if (currentQuestion.isText) {
            const container = document.createElement('div');
            container.classList.add('text-input-container');
            
            const input = document.createElement('input');
            input.type = "text";
            input.placeholder = "Cevabınızı girin (Örn: 98 KIAS veya 190 CM)";
            input.classList.add('text-answer-input');
            input.id = "text-reply";
            
            if(state.status !== 'unanswered') {
                input.value = state.userA;
                input.disabled = true;
            }
            
            const submitBtn = document.createElement('button');
            submitBtn.innerText = "Cevabı Onayla";
            submitBtn.classList.add('text-answer-submit');
            submitBtn.onclick = () => checkTextAnswer(input.value);
            
            if(state.status !== 'unanswered') {
                submitBtn.style.display = 'none';
            }

            container.appendChild(input);
            container.appendChild(submitBtn);
            optionsContainer.appendChild(container);
            
            if(state.status !== 'unanswered') {
                showExplanationStatic(state.status === 'correct', currentQuestion.cevap, currentQuestion.aciklama);
            }
        } 
        else {
            currentQuestion.secenekler.forEach(option => {
                const button = document.createElement('button');
                button.innerText = option;
                button.classList.add('btn');
                
                if (state.status === 'unanswered') {
                    button.addEventListener('click', () => checkMultipleChoice(button, option, currentQuestion.cevap, currentQuestion.aciklama));
                } else {
                    button.disabled = true;
                    if (option === currentQuestion.cevap) {
                        button.classList.add('correct');
                    }
                    if (state.status === 'wrong' && option === state.userA) {
                        button.classList.add('wrong');
                    }
                }
                optionsContainer.appendChild(button);
            });

            if(state.status !== 'unanswered') {
                showExplanationStatic(state.status === 'correct', currentQuestion.cevap, currentQuestion.aciklama);
            }
        }

        prevBtn.disabled = (currentQuestionIndex === 0);
        
        if (currentQuestionIndex === activeQuestions.length - 1) {
            nextBtn.innerText = "Sınavı Bitir";
            nextBtn.className = "nav-btn finish-style";
        } else {
            nextBtn.innerText = "Sonraki";
            nextBtn.className = "nav-btn next-style";
        }

        updateMatrixUI();
    }

    function checkMultipleChoice(selectedBtn, selectedOption, correctAnswer, aciklama) {
        let state = questionStates[currentQuestionIndex];
        state.userA = selectedOption;
        
        const buttons = optionsContainer.querySelectorAll('.btn');
        buttons.forEach(btn => btn.disabled = true);

        if (selectedOption === correctAnswer) {
            state.status = 'correct';
            selectedBtn.classList.add('correct');
        } else {
            state.status = 'wrong';
            selectedBtn.classList.add('wrong');
            buttons.forEach(btn => {
                if(btn.innerText === correctAnswer) btn.classList.add('correct');
            });
        }

        showExplanationStatic(state.status === 'correct', correctAnswer, aciklama);
        updateMatrixUI();
    }

    function checkTextAnswer(userInput) {
        let cleanInput = userInput.trim().toLowerCase().replace(/\s+/g, '');
        let currentQuestion = activeQuestions[currentQuestionIndex];
        let cleanAnswer = currentQuestion.cevap.trim().toLowerCase().replace(/\s+/g, '');
        
        if(cleanInput === "") {
            alert("Lütfen bir yanıt metni giriniz!");
            return;
        }

        let state = questionStates[currentQuestionIndex];
        state.userA = userInput;

        if(cleanInput === cleanAnswer) {
            state.status = 'correct';
        } else {
            state.status = 'wrong';
        }

        document.getElementById('text-reply').disabled = true;
        const submitBtn = optionsContainer.querySelector('.text-answer-submit');
        if(submitBtn) submitBtn.style.display = 'none';

        showExplanationStatic(state.status === 'correct', currentQuestion.cevap, currentQuestion.aciklama);
        updateMatrixUI();
    }

    function showExplanationStatic(isCorrect, rightAnswer, text) {
        explanationBox.innerHTML = `<strong>${isCorrect ? 'Doğru! ✔️' : 'Yanlış! ❌'}</strong> Doğru Cevap: ${rightAnswer}<br>${text}`;
        explanationBox.style.display = 'block';
    }

    function prevQuestion() {
        if (currentQuestionIndex > 0) {
            currentQuestionIndex--;
            loadQuestion();
        }
    }

    function pasQuestion() {
        let state = questionStates[currentQuestionIndex];
        if(state.status === 'unanswered') {
            state.status = 'pas';
            state.userA = '';
        }
        handleNextOrFinish();
    }

    function handleNextOrFinish() {
        if (currentQuestionIndex < activeQuestions.length - 1) {
            currentQuestionIndex++;
            loadQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        quizBody.style.display = 'none';
        progressBarContainer.style.display = 'none';
        questionCounter.style.display = 'none';
        
        let correctCount = questionStates.filter(s => s.status === 'correct').length;
        let wrongCount = questionStates.filter(s => s.status === 'wrong').length;
        let pasCount = questionStates.filter(s => s.status === 'pas' || s.status === 'unanswered').length;
        
        const percentage = Math.round((correctCount / activeQuestions.length) * 100);
        saveHistory(selectedAircraft, percentage);

        resultBody.style.display = 'block';
        document.getElementById('score').innerText = correctCount;
        document.getElementById('total').innerText = activeQuestions.length;
        
        userScoreMsg.innerText = `Pilot ${currentUser}, Bu Testteki Başarı Oranınız: %${percentage}`;
        
        setTimeout(() => {
            renderPieChart(correctCount, wrongCount, pasCount);
        }, 150);
    }

    function renderPieChart(correct, wrong, pas) {
        const canvas = document.getElementById('pie-canvas');
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        const total = correct + wrong + pas;
        if(total === 0) return;

        const data = [correct, wrong, pas];
        const colors = ['#48bb78', '#f56565', '#a0aec0']; 
        const labels = ['Doğru', 'Yanlış', 'Boş/Pas'];

        let centerX = 100;
        let centerY = 100;
        let radius = 75;
        let startAngle = 0;

        for (let i = 0; i < data.length; i++) {
            if(data[i] === 0) continue;
            let sliceAngle = (data[i] / total) * 2 * Math.PI;

            ctx.beginPath();
            ctx.fillStyle = colors[i];
            ctx.moveTo(centerX, centerY);
            ctx.arc(centerX, centerY, radius, startAngle, startAngle + sliceAngle);
            ctx.closePath();
            ctx.fill();

            startAngle += sliceAngle;
        }

        ctx.font = '12px Arial';
        let legendX = 200;
        let legendY = 50;

        for (let i = 0; i < data.length; i++) {
            ctx.fillStyle = colors[i];
            ctx.fillRect(legendX, legendY + (i * 25), 15, 15);

            ctx.fillStyle = '#4a5568';
            ctx.fillText(`${labels[i]}: ${data[i]}`, legendX + 22, legendY + 12 + (i * 25));
        }
    }

    function backToMenu() {
        showMainMenu();
    }

    function saveHistory(aircraft, pct) {
        let history = JSON.parse(localStorage.getItem('quiz_history')) || [];
        const newRecord = {
            pilot: currentUser, 
            aircraft: aircraft.toUpperCase(),
            score: pct,
            date: new Date().toLocaleDateString('tr-TR', {hour: '2-digit', minute:'2-digit'})
        };
        history.push(newRecord);
        localStorage.setItem('quiz_history', JSON.stringify(history));
    }

    function handleSignatureClick() {
        signatureClickCount++;
        if (signatureClickCount === 3) {
            if (adminPanel.style.display === 'none' || adminPanel.style.display === '') {
                updateAdminTable();
                adminPanel.style.display = 'block';
                adminPanel.scrollIntoView({ behavior: 'smooth' });
            } else {
                adminPanel.style.display = 'none';
            }
            signatureClickCount = 0;
        }
    }

    function updateAdminTable() {
        const history = JSON.parse(localStorage.getItem('quiz_history')) || [];
        adminTableBody.innerHTML = '';
        
        if(history.length === 0) {
            adminTableBody.innerHTML = `<tr><td colspan="4" style="text-align:center; color:#a0aec0;">Henüz sınav kaydı bulunmuyor.</td></tr>`;
            return;
        }

        [...history].reverse().forEach(log => {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td style="font-weight:600;">${log.pilot || 'Bilinmeyen'}</td>
                <td>${log.aircraft}</td>
                <td style="font-weight:bold; color:${log.score >= 75 ? '#2f855a' : '#c53030'}">%${log.score}</td>
                <td>${log.date}</td>
            `;
            adminTableBody.appendChild(row);
        });
    }

    function clearAdminLogs() {
        if(confirm("Tüm kullanıcı sınav geçmişini silmek istediğinize emin misiniz?")) {
            localStorage.removeItem('quiz_history');
            updateAdminTable();
            drawChart();
        }
    }

    function drawChart() {
        const history = JSON.parse(localStorage.getItem('quiz_history')) || [];
        const canvas = document.getElementById('stats-canvas');
        const statsPanel = document.getElementById('stats-panel');
        
        if (history.length === 0) {
            statsPanel.style.display = 'none';
            return;
        }
        
        statsPanel.style.display = 'block';
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        const padding = 30;
        const chartWidth = canvas.width - padding * 2;
        const chartHeight = canvas.height - padding * 2;
        
        ctx.beginPath();
        ctx.strokeStyle = '#cbd5e0';
        ctx.lineWidth = 1;
        ctx.moveTo(padding, padding);
        ctx.lineTo(padding, canvas.height - padding);
        ctx.lineTo(canvas.width - padding, canvas.height - padding);
        ctx.stroke();

        const points = [];
        const displayHistory = history.slice(-5);
        const stepX = displayHistory.length > 1 ? chartWidth / (displayHistory.length - 1) : chartWidth;

        displayHistory.forEach((data, index) => {
            const x = padding + (index * stepX);
            const y = (canvas.height - padding) - (data.score / 100 * chartHeight);
            points.push({x, y, label: data.aircraft, score: data.score});
        });

        if (points.length > 0) {
            ctx.beginPath();
            ctx.strokeStyle = '#328cc1';
            ctx.lineWidth = 3;
            ctx.moveTo(points[0].x, points[0].y);
            for(let i=1; i<points.length; i++) {
                ctx.lineTo(points[i].x, points[i].y);
            }
            ctx.stroke();
        }

        points.forEach(p => {
            ctx.beginPath();
            ctx.fillStyle = '#0b3c5d';
            ctx.arc(p.x, p.y, 5, 0, Math.PI * 2);
            ctx.fill();

            ctx.font = 'bold 9px Arial';
            ctx.fillStyle = '#4a5568';
            ctx.fillText(`%${p.score}`, p.x - 8, p.y - 10);
            ctx.font = '8px Arial';
            ctx.fillText(p.label, p.x - 12, canvas.height - padding + 15);
        });
    }
</script>
